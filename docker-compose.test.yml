services:
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    volumes:
      - ./shared:/app/shared
      - ./services:/app/services
      - ./tests:/app/tests
    command: >
      pytest tests/ -v
      --cov=shared
      --cov=services
      --cov-report=term-missing
      --cov-fail-under=80
