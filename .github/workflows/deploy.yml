name: Test and Deploy

on:
  push:
    branches: 
      - main
      - dev
  pull_request:
    branches: 
      - main
      - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Run full test suite ─────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test image and run pytest
        run: |
          docker compose -f docker-compose.test.yml build --no-cache
          docker compose -f docker-compose.test.yml up \
            --abort-on-container-exit \
            --exit-code-from test

  # ── Deploy webhook service ──────────────────────────────────────────────────
  deploy-webhook:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push pipeline image
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev
          docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest \
            -f Dockerfile .
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy kobo-webhook-receiver \
            --image=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest \
            --region=${{ secrets.GCP_REGION }} \
            --min-instances=0 \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=${{ secrets.GCP_SA_EMAIL }} \
            --set-secrets=KOBO_TOKEN=kobo-token:latest,KOBO_WEBHOOK_SECRET=kobo-webhook-secret:latest

  # ── Deploy sync job ─────────────────────────────────────────────────────────
  deploy-sync:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push pipeline image
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev
          docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest \
            -f Dockerfile .
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest

      - name: Deploy to Cloud Run Jobs
        run: |
          gcloud run jobs update kobo-full-sync \
            --image=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest \
            --region=${{ secrets.GCP_REGION }} \
            --service-account=${{ secrets.GCP_SA_EMAIL }} \
            || gcloud run jobs create kobo-full-sync \
            --image=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest \
            --region=${{ secrets.GCP_REGION }} \
            --service-account=${{ secrets.GCP_SA_EMAIL }}
