name: Test and Deploy

on:
  push:
    branches: 
      - main
      - dev
  pull_request:
    branches: 
      - main
      - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Run full test suite ─────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test image and run pytest
        run: |
          docker compose -f docker-compose.test.yml build --no-cache
          docker compose -f docker-compose.test.yml up \
            --abort-on-container-exit \
            --exit-code-from test

  # ── Deploy webhook service ──────────────────────────────────────────────────
  deploy-webhook:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push pipeline image
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev
          docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest \
            -f Dockerfile .
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest

      - name: Create env vars file for webhook
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          BQ_TABLE: ${{ secrets.BQ_TABLE }}
          FORM_UID: ${{ secrets.FORM_UID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          SHEET_TAB: ${{ secrets.SHEET_TAB }}
          SHARED_DRIVE_FOLDER_ID: ${{ secrets.SHARED_DRIVE_FOLDER_ID }}
          DELEGATED_EMAIL: ${{ secrets.DELEGATED_EMAIL }}
          SA_KEY_SECRET: ${{ secrets.SA_KEY_SECRET }}
          SYNC_MODE: ${{ secrets.SYNC_MODE }}
          MAX_SHEET_ROWS: ${{ secrets.MAX_SHEET_ROWS }}
          TEST_KEYWORDS: ${{ secrets.TEST_KEYWORDS }}
          TEAM_EMAILS: ${{ secrets.TEAM_EMAILS }}
          NEW_ENTRY_NOTIFY_EMAILS: ${{ secrets.NEW_ENTRY_NOTIFY_EMAILS }}
          ALERT_EMAILS: ${{ secrets.ALERT_EMAILS }}
        run: |
          cat > /tmp/webhook-env.yaml << EOF
          BQ_PROJECT: "${BQ_PROJECT}"
          BQ_DATASET: "${BQ_DATASET}"
          BQ_TABLE: "${BQ_TABLE}"
          FORM_UID: "${FORM_UID}"
          SHEET_ID: "${SHEET_ID}"
          SHEET_NAME: "${SHEET_NAME}"
          SHEET_TAB: "${SHEET_TAB}"
          SHARED_DRIVE_FOLDER_ID: "${SHARED_DRIVE_FOLDER_ID}"
          DELEGATED_EMAIL: "${DELEGATED_EMAIL}"
          SA_KEY_SECRET: "${SA_KEY_SECRET}"
          SYNC_MODE: "${SYNC_MODE}"
          MAX_SHEET_ROWS: "${MAX_SHEET_ROWS}"
          TEST_KEYWORDS: "${TEST_KEYWORDS}"
          TEAM_EMAILS: "${TEAM_EMAILS}"
          NEW_ENTRY_NOTIFY_EMAILS: "${NEW_ENTRY_NOTIFY_EMAILS}"
          ALERT_EMAILS: "${ALERT_EMAILS}"
          EOF

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy kobo-webhook-receiver \
            --image=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest \
            --region=${{ secrets.GCP_REGION }} \
            --min-instances=0 \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=${{ secrets.GCP_SA_EMAIL }} \
            --env-vars-file=/tmp/webhook-env.yaml \
            --set-secrets=KOBO_TOKEN=KOBO_API_TOKEN:latest,KOBO_WEBHOOK_SECRET=kobo-webhook-secret:latest

  # ── Deploy sync job ─────────────────────────────────────────────────────────
  deploy-sync:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push pipeline image
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev
          docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest \
            -f Dockerfile .
          docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest

      - name: Create env vars file for sync
        env:
          BQ_PROJECT: ${{ secrets.BQ_PROJECT }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          BQ_TABLE: ${{ secrets.BQ_TABLE }}
          FORM_UID: ${{ secrets.FORM_UID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          SHEET_TAB: ${{ secrets.SHEET_TAB }}
          SHARED_DRIVE_FOLDER_ID: ${{ secrets.SHARED_DRIVE_FOLDER_ID }}
          DELEGATED_EMAIL: ${{ secrets.DELEGATED_EMAIL }}
          SA_KEY_SECRET: ${{ secrets.SA_KEY_SECRET }}
          SYNC_MODE: ${{ secrets.SYNC_MODE }}
          MAX_SHEET_ROWS: ${{ secrets.MAX_SHEET_ROWS }}
          TEST_KEYWORDS: ${{ secrets.TEST_KEYWORDS }}
          TEAM_EMAILS: ${{ secrets.TEAM_EMAILS }}
          NEW_ENTRY_NOTIFY_EMAILS: ${{ secrets.NEW_ENTRY_NOTIFY_EMAILS }}
          ALERT_EMAILS: ${{ secrets.ALERT_EMAILS }}
        run: |
          cat > /tmp/sync-env.yaml << EOF
          BQ_PROJECT: "${BQ_PROJECT}"
          BQ_DATASET: "${BQ_DATASET}"
          BQ_TABLE: "${BQ_TABLE}"
          FORM_UID: "${FORM_UID}"
          SHEET_ID: "${SHEET_ID}"
          SHEET_NAME: "${SHEET_NAME}"
          SHEET_TAB: "${SHEET_TAB}"
          SHARED_DRIVE_FOLDER_ID: "${SHARED_DRIVE_FOLDER_ID}"
          DELEGATED_EMAIL: "${DELEGATED_EMAIL}"
          SA_KEY_SECRET: "${SA_KEY_SECRET}"
          SYNC_MODE: "${SYNC_MODE}"
          MAX_SHEET_ROWS: "${MAX_SHEET_ROWS}"
          TEST_KEYWORDS: "${TEST_KEYWORDS}"
          TEAM_EMAILS: "${TEAM_EMAILS}"
          NEW_ENTRY_NOTIFY_EMAILS: "${NEW_ENTRY_NOTIFY_EMAILS}"
          ALERT_EMAILS: "${ALERT_EMAILS}"
          EOF

      - name: Deploy to Cloud Run Jobs
        run: |
          gcloud run jobs update kobo-full-sync \
            --image=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest \
            --region=${{ secrets.GCP_REGION }} \
            --service-account=${{ secrets.GCP_SA_EMAIL }} \
            --env-vars-file=/tmp/sync-env.yaml \
            --set-secrets=KOBO_TOKEN=KOBO_API_TOKEN:latest \
            || gcloud run jobs create kobo-full-sync \
            --image=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/kobo-pipeline/kobo-pipeline:latest \
            --region=${{ secrets.GCP_REGION }} \
            --service-account=${{ secrets.GCP_SA_EMAIL }} \
            --env-vars-file=/tmp/sync-env.yaml \
            --set-secrets=KOBO_TOKEN=KOBO_API_TOKEN:latest
